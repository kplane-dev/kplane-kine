# Dev-only credentials for the benchmark / demo cluster. Plaintext is
# fine here — the cluster has no exposure beyond localhost in either
# the laptop or CI setup, and the kind cluster is torn down at the
# end of every run. DO NOT copy these defaults into a production
# postgres.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: kine-pg
type: Opaque
stringData:
  POSTGRES_USER: kine
  POSTGRES_DB: kine
  POSTGRES_PASSWORD: kinepass
