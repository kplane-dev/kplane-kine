apiVersion: apps/v1
kind: Deployment
metadata:
  name: kine
  namespace: kine-pg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kine
  template:
    metadata:
      labels:
        app: kine
    spec:
      containers:
        - name: kine
          # Official k3s-io image. rancher/kine on Docker Hub maxed out at
          # v0.14.x; v0.15.0+ lives on GHCR under the k3s-io org.
          image: ghcr.io/k3s-io/kine:v0.15.0
          imagePullPolicy: IfNotPresent
          args:
            - --listen-address=0.0.0.0:2379
            - --endpoint=postgres://kine:kinepass@postgres.kine-pg.svc:5432/kine?sslmode=disable
            - --metrics-bind-address=0.0.0.0:8080
          ports:
            - name: etcd
              containerPort: 2379
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: etcd
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: etcd
            initialDelaySeconds: 20
            periodSeconds: 20
