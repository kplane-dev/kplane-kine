apiVersion: v1
kind: Service
metadata:
  name: kplane-apiserver
  namespace: etcd-baseline
spec:
  # NodePort 30444 → host 6444 (kind extraPortMapping). Sibling to the
  # kine-backed apiserver's 6443. The bench process hits both ports
  # back-to-back, never in parallel.
  type: NodePort
  selector:
    app: kplane-apiserver
  ports:
    - name: https
      port: 6443
      targetPort: https
      nodePort: 30444
