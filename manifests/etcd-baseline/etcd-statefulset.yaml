apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: etcd-baseline
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.17
          imagePullPolicy: IfNotPresent
          command:
            - etcd
          args:
            - --name=etcd-0
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd.etcd-baseline.svc:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://etcd-0.etcd.etcd-baseline.svc:2380
            - --initial-cluster=etcd-0=http://etcd-0.etcd.etcd-baseline.svc:2380
            - --initial-cluster-state=new
            - --initial-cluster-token=kplane-kine-bench
            # Resource envelope intentionally matches postgres's so the
            # head-to-head isn't biased on allocation — see
            # docs/architecture.md.
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: client
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: client
            initialDelaySeconds: 30
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
