apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: etcd-baseline
spec:
  clusterIP: None  # headless — single replica, addressed by name
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
    - name: peer
      port: 2380
      targetPort: peer
